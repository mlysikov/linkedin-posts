services:
  postgres:
    image: postgres:18.3
    container_name: demo-postgres
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: Password1
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./sql:/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:25.8.28
    container_name: demo-clickhouse
    environment:
      CLICKHOUSE_DB: demo
      CLICKHOUSE_USER: demo
      CLICKHOUSE_PASSWORD: Password1
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./sql:/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user demo --password Password1 --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  oracle:
    image: container-registry.oracle.com/database/free:23.26.0.0-lite
    container_name: demo-oracle
    environment:
      ORACLE_PWD: Password1
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./sql:/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM dual;' | sqlplus -s system/Password1@localhost:1521/FREEPDB1 | grep -q 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

volumes:
  postgres-data:
  clickhouse-data:
  oracle-data:
